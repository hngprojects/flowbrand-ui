name: Feature
description: An enhancement or feature
title: "[Feature]: "
labels:
  - triage
  - feature

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A step-by-step description of the suggested feature/enhancement.
      placeholder: On the user page, you should be able to...
    validations:
      required: true

  - type: textarea
    id: acceptanceCriteria
    attributes:
      label: Acceptance Criteria
      description: What must be achieved for this feature to be considered complete.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        Please include any screenshots that help demonstrate the feature.
        Highlight the specific areas this feature applies to.

  - type: textarea
    id: links
    attributes:
      label: Links
      description: Add supporting resources (e.g., Figma, docs)
      placeholder: |
        [Figma Link](LINK_HERE)

  - type: textarea
    id: images
    attributes:
      label: Images
      description: Paste image URLs or upload screenshots
      placeholder: |
        ![image](URL_HERE)
