name: Deploy Frontend

on:
  push:
    branches:
      - dev
      - staging
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}

          script: |
            if [ "${{ github.ref_name }}" = "staging" ]; then
              cd /home/okezie/staging/flowbrand-ui
              git pull origin staging
              pnpm install
              pnpm build
              pm2 restart flowbrand-ui-staging

            elif [ "${{ github.ref_name }}" = "main" ]; then
              cd /home/okezie/projects/flowbrand-ui
              git pull origin main
              pnpm install
              pnpm build
              pm2 restart flowbrand-ui

            else
              cd /home/okezie/projects/flowbrand-ui
              git pull origin dev
              pnpm install
              pnpm build
              pm2 restart flowbrand-ui
            fi
