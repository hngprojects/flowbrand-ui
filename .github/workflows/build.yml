name: build


on:
  push:
  pull_request:


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v4


      - name: step-up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: set-up node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: build project
        run: pnpm build
